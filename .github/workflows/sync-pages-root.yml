name: Sync Pages Root Files

"on":
  push:
    branches:
      - main
    paths:
      - public/index.html
      - public/app.js
      - public/styles.css
      - scripts/sync-pages-root.sh
      - .github/workflows/sync-pages-root.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-root:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run sync script
        run: bash scripts/sync-pages-root.sh

      - name: Commit synced files
        run: |
          if git diff --quiet -- index.html app.js styles.css .nojekyll; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html app.js styles.css .nojekyll
          git commit -m "chore: sync Pages root from public"
          git push
