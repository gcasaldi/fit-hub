<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fit Hub AI Coach</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="orb orb-left"></div>
    <div class="orb orb-right"></div>

    <main class="app-shell">
      <section class="hero card reveal">
        <p class="kicker">FIT HUB AI</p>
        <h1>Diventa muscoloso e magro con un coach che ti parla davvero.</h1>
        <p>
          Rispondi a poche domande essenziali e ricevi consigli personalizzati su allenamento,
          ricette e recupero. Puoi anche parlare con la tua voce.
        </p>
      </section>

      <section class="panel-grid">
        <section class="card profile-card reveal delay-1">
          <h2>Profilo Fitness</h2>
          <form id="profile-form" class="profile-form">
            <label>Nome<input name="name" placeholder="Es. Luca" /></label>
            <label>Eta<input name="age" type="number" min="14" max="100" required /></label>
            <label>Sesso
              <select name="sex" required>
                <option value="">Seleziona</option>
                <option>Uomo</option>
                <option>Donna</option>
                <option>Altro</option>
              </select>
            </label>
            <label>Peso (kg)<input name="weightKg" type="number" step="0.1" min="30" required /></label>
            <label>Altezza (cm)<input name="heightCm" type="number" min="120" max="230" required /></label>
            <label>Livello allenamento
              <select name="trainingLevel" required>
                <option value="">Seleziona</option>
                <option>Principiante</option>
                <option>Intermedio</option>
                <option>Avanzato</option>
              </select>
            </label>
            <label>Giorni a settimana<input name="trainingDays" type="number" min="1" max="7" required /></label>
            <label>Attrezzatura
              <select name="equipment" required>
                <option value="">Seleziona</option>
                <option>Corpo libero</option>
                <option>Manubri + elastici</option>
                <option>Palestra completa</option>
              </select>
            </label>
            <label>Stile alimentare
              <select name="dietStyle" required>
                <option value="">Seleziona</option>
                <option>Onnivoro</option>
                <option>Vegetariano</option>
                <option>Vegano</option>
              </select>
            </label>
            <label>Allergie/intolleranze<input name="allergies" placeholder="Es. lattosio" /></label>
            <label>Obiettivo principale
              <select name="goal" required>
                <option value="">Seleziona</option>
                <option>Perdere grasso mantenendo muscolo</option>
                <option>Aumentare massa magra</option>
                <option>Ricomp. corporea</option>
              </select>
            </label>
            <label class="wide">Note<input name="notes" placeholder="Infortuni, tempi, preferenze..." /></label>

            <button class="btn-primary wide" type="submit">Attiva Coach</button>
          </form>

          <div id="metrics" class="metrics hidden"></div>
        </section>

        <section class="card chat-card reveal delay-2">
          <div class="chat-head">
            <h2>Coach AI</h2>
            <span id="coach-state" class="state-pill">In attesa del tuo profilo</span>
          </div>

          <div id="chat-window" class="chat-window"></div>

          <form id="chat-form" class="chat-form">
            <input
              id="chat-input"
              type="text"
              placeholder="Scrivi la tua richiesta: piano settimanale, ricette, scheda..."
              disabled
              required
            />
            <button class="btn-primary" type="submit" disabled id="send-btn">Invia</button>
            <button class="btn-secondary" type="button" id="voice-btn" disabled>Parla</button>
          </form>
        </section>
      </section>
    </main>

    <template id="msg-template">
      <article class="msg">
        <p class="meta"></p>
        <p class="content"></p>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
